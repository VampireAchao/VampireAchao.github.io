ss="info-item-1"><i class="far fa-calendar-alt fa-fw"></i> 2025-02-26</div><div class="info-item-2">JS的线程模型和事件循环机制</div></div><div class="info-2"><div class="info-item-1"> 生命不是安排，而是追求。——弗吉尼亚·伍尔芙  从线程和浏览器底层执行的角度来看，JavaScript 的延迟&#x2F;休眠功能是如何实现的呢？ 线程模型和事件循环JavaScript 的执行环境（如浏览器或 Node.js）是单线程的，这意味着在任何给定的时间点，只有一个线程在执行 JavaScript 代码。为了管理并发操作，JavaScript 依赖于事件循环（Event Loop）。 事件循环事件循环是一个不断检查和处理消息队列的机制。它会执行以下步骤：  检查调用栈（Call Stack），如果调用栈为空，则继续。 检查消息队列（Message Queue），如果消息队列中有待处理的任务，则取出队首的任务并执行。 重复以上步骤。  宏任务和微任务在事件循环中，有两种类型的任务：宏任务（Macro Task）和微任务（Micro Task）。  宏任务：包括整体脚本执行、setTimeout、setInterval、setImmediate（Node.js）等。 微任务：包括 Promise 的回调、process.nextTick（Node.js）、Mutation...</div></div></div></a></div></div></div><div class="aside-content" id="aside-content"><div class="card-widget card-info text-center"><div class="avatar-img"><img src="/img/head.png" onerror="this.onerror=null;this.src='/img/friend_404.gif'" alt="avatar"/></div><div class="author-info-name">阿超</div><div class="author-info-description">我的名字叫阿超 年龄25岁 家在北京市 职业是软件开发 每天最晚也会在八点前回家 不抽烟 酒浅尝辄止 晚上十二点上床 保证睡足八个小时 睡前写一篇博客 再做二十分钟俯卧撑暖身 然后再睡觉 基本能熟睡到天亮 像婴儿一样不留下任何疲劳和压力 就这样迎来第二天的早晨 健康检查结果也显示我很正常 我想说明我是一个不论何时都追求内心平稳的人 不拘泥于胜负 不纠结于烦恼 不树立使我夜不能寐的敌人 这就是我在这社会的生活态度</div><div class="site-data"><a href="/archives/"><div class="headline">文章</div><div class="length-num">2098</div></a><a href="/tags/"><div class="headline">标签</div><div class="length-num">34</div></a><a href="/categories/"><div class="headline">分类</div><div class="length-num">0</div></a></div><a id="card-info-btn" target="_blank" rel="noopener" href="https://github.com/xxxxxx"><i class="fab fa-github"></i><span>Follow Me</span></a></div><div class="card-widget card-announcement"><div class="item-headline"><i class="fas fa-bullhorn fa-shake"></i><span>公告</span></div><div class="announcement_content">This is my Blog</div></div><div class="sticky_layout"><div class="card-widget card-recent-post"><div class="item-headline"><i class="fas fa-history"></i><span>最新文章</span></div><di
